name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest   # ships shellcheck preinstalled — no third-party action needed
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: shellcheck bin/
        # Gate at hard errors only for now; tighten to `-S warning` once a clean
        # run confirms the existing scripts are warning-clean.
        run: shellcheck -S error bin/*

  drift-check-selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: drift-check runs and reports no drift against itself
        run: ./bin/agent-board-toolkit-drift-check . .
