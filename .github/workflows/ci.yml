name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest   # ships shellcheck preinstalled — no third-party action needed
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: shellcheck bin/ and tests/
        # Gate at hard errors only for now; tighten to `-S warning` once a clean
        # run confirms the existing scripts are warning-clean.
        run: shellcheck -S error bin/* tests/*.sh

  drift-check-selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: drift-check runs and reports no drift against itself
        run: ./bin/agent-board-toolkit-drift-check . .

  adopt-to-dl-selftest:
    # Exercises adopt-to-dl's pure decision logic (arg/repo validation, the
    # already-adopted guard, pr_url build, by-ref-response parse) network-free —
    # the same deterministic-guard pattern as promote-action-selftest.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: adopt-to-dl pure-logic unit checks
        run: bash tests/adopt-to-dl-selftest.sh

  kb-host-guard-selftest:
    # Exercises the anti-exfiltration api_base host guard's DECISIONS, in both of its copies
    # (the lib's kb_require_https_host and promote-released-cards' standalone host_ok mirror),
    # against a hostile-URL matrix. The guard ran on every checkout and every promote with
    # zero coverage of whether it decided correctly — which is how #4346 survived. Also
    # asserts the two copies AGREE: they are sync-paired by comment only.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: api_base host-guard decision matrix
        run: bash tests/kb-host-guard-selftest.sh

  board-card-start-selftest:
    # Exercises the pure decision logic of board-card-start + install-board-hooks network-free:
    # the RFC-2606/6761 placeholder-host detector (anchored so real hosts aren't misread), the
    # install-target/refuse discriminator for core.hooksPath, and the durable-log helper.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: board-card-start pure-logic unit checks
        run: bash tests/board-card-start-selftest.sh

  promote-action-selftest:
    # Guards the composite action's wiring: SHA-pinned consumers get no
    # toolkit-side signal if the wrapper rots (shellcheck only sees bin/*).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Wiring assertions (parse, script path, flag contract, embedded shellcheck)
        run: |
          test -x bin/promote-released-cards
          # the flags the wrapper passes must exist in the script's CLI parser
          grep -q -- '--dls)' bin/promote-released-cards
          grep -q -- '--dry-run)' bin/promote-released-cards
          # extract the embedded run block and shellcheck it under the runner's flags
          python3 - <<'PY'
          import yaml
          d = yaml.safe_load(open('promote/action.yml'))
          assert d['runs']['using'] == 'composite'
          step = d['runs']['steps'][0]
          assert step['shell'] == 'bash'
          assert '"$GITHUB_ACTION_PATH/../bin/promote-released-cards"' in step['run']
          with open('/tmp/action-run.sh', 'w') as f:
              f.write('#!/usr/bin/env bash\nset -e -o pipefail\n' + step['run'])
          PY
          shellcheck -S error /tmp/action-run.sh
      - name: Invoke the action (expects fail-closed at the token guard)
        # Proves the runner can execute the composite end-to-end into the
        # script: with an empty token it must die at the KANBAN_WRITEBACK_TOKEN
        # guard (deterministic, no network). Success here would mean the guard
        # rotted; any other wiring breakage also lands in 'failure'.
        id: smoke
        continue-on-error: true
        uses: ./promote
        with:
          writeback-token: ''
          expected-host: kanban.invalid
          dry-run: 'true'
      - name: Assert fail-closed
        env:
          SMOKE_OUTCOME: ${{ steps.smoke.outcome }}
        run: |
          [ "$SMOKE_OUTCOME" = "failure" ] || { echo "::error::promote action ran with an empty token — the fail-closed guard did not fire"; exit 1; }
