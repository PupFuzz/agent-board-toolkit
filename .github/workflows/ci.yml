name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest   # ships shellcheck preinstalled — no third-party action needed
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: shellcheck bin/, hooks/ and tests/
        # Gate at hard errors only for now; tighten to `-S warning` once a clean
        # run confirms the existing scripts are warning-clean. Non-shell helpers
        # (e.g. bin/*.py shims) are filtered out — shellcheck cannot parse them
        # (SC1071); they are syntax-checked in the python-shims step below.
        run: shellcheck -S error $(find bin hooks -maxdepth 1 -type f ! -name '*.py'; find tests -maxdepth 1 -type f -name '*.sh')
      - name: python shims compile clean
        run: python3 -m py_compile bin/*.py

  drift-check-selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: drift-check runs and reports no drift against itself
        run: ./bin/agent-board-toolkit-drift-check . .

  selftest:
    # The network-free `tests/*-selftest.sh` scripts, one matrix job each — they were 10
    # byte-for-byte-identical checkout+`bash tests/X.sh` jobs whose only difference was the
    # filename (dedup-audit D6-CI). Each selftest documents WHAT it guards (and the regression
    # that motivated it) in its own file header, so that context is not lost by collapsing the
    # per-job CI comments. fail-fast:false keeps every selftest running independently, exactly
    # as the separate jobs did — one failure must never cancel the siblings. The `drift-check`,
    # `shellcheck`, and `promote-action` jobs stay separate: they do NOT run `bash tests/X.sh`.
    #
    # KEEP THIS LIST IN SYNC with `tests/*-selftest.sh` — a new selftest needs a matrix entry
    # here, the same as it needed its own job before.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test:
          - adopt-to-dl-selftest
          - board-card-start-selftest
          - board-session-close-selftest
          - board-snapshot-selftest
          - kb-board-lib-selftest
          - kb-host-guard-selftest
          - kbc-may-archive-selftest
          - kbcard-selftest
          - next-dl-selftest
          - promote-pagination-selftest
          - release-pr-body-selftest
          - runtime-check-selftest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: bash tests/${{ matrix.test }}.sh
        run: bash "tests/${{ matrix.test }}.sh"

  promote-action-selftest:
    # Guards the composite action's wiring: SHA-pinned consumers get no
    # toolkit-side signal if the wrapper rots (shellcheck only sees bin/*).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Wiring assertions (parse, script path, flag contract, embedded shellcheck)
        run: |
          test -x bin/promote-released-cards
          # the flags the wrapper passes must exist in the script's CLI parser
          grep -q -- '--dls)' bin/promote-released-cards
          grep -q -- '--dry-run)' bin/promote-released-cards
          # extract the embedded run block and shellcheck it under the runner's flags
          python3 - <<'PY'
          import yaml
          d = yaml.safe_load(open('promote/action.yml'))
          assert d['runs']['using'] == 'composite'
          step = d['runs']['steps'][0]
          assert step['shell'] == 'bash'
          assert '"$GITHUB_ACTION_PATH/../bin/promote-released-cards"' in step['run']
          with open('/tmp/action-run.sh', 'w') as f:
              f.write('#!/usr/bin/env bash\nset -e -o pipefail\n' + step['run'])
          PY
          shellcheck -S error /tmp/action-run.sh
      - name: Invoke the action (expects fail-closed at the token guard)
        # Proves the runner can execute the composite end-to-end into the
        # script: with an empty token it must die at the KANBAN_WRITEBACK_TOKEN
        # guard (deterministic, no network). Success here would mean the guard
        # rotted; any other wiring breakage also lands in 'failure'.
        id: smoke
        continue-on-error: true
        uses: ./promote
        with:
          writeback-token: ''
          expected-host: kanban.invalid
          dry-run: 'true'
      - name: Assert fail-closed
        env:
          SMOKE_OUTCOME: ${{ steps.smoke.outcome }}
        run: |
          [ "$SMOKE_OUTCOME" = "failure" ] || { echo "::error::promote action ran with an empty token — the fail-closed guard did not fire"; exit 1; }
