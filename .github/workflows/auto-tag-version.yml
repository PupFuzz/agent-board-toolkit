name: Auto-tag version on merge to main

# Fires on every push to main (release-PR merges). Reads the version string
# from the VERSION file at repo root and creates a v<version> git tag at the
# merge commit. Idempotent: tag already present at this SHA → skip.
# Tag-already-at-a-different-SHA → fail loud (two merges claimed the same
# version; the release PR forgot to bump VERSION). Eliminates the manual
# `git tag -a v<X> <SHA> && git push --tags` step in the release flow.
#
# Adapted from agent-webhook-bridge's auto-tag-version.yml. This workflow is
# tag-only: it omits the bridge's "GitHub Release from the CHANGELOG section"
# step. (As of v0.8.2 a docs/CHANGELOG.md exists, so that step *could* be added
# for parity with the bridge — deliberately left out for now.) VERSION is the
# single source of truth (releases bump it on the release/v<version> branch).

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with tags)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Extract version from VERSION
        id: ver
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          # Single-source the version SHAPE: .release-pr.json's version_regex is the one
          # declaration of "what a version looks like" (also read by the release tooling).
          # It is intentionally UNANCHORED there (used to extract a version); this strict
          # merge-time check anchors it (^...$) for a full-string match. Anchoring is this
          # step's usage, the shape is the shared fact — so the two no longer diverge.
          REGEX=$(jq -r '.version_regex // empty' .release-pr.json)
          if [ -z "$REGEX" ]; then
            echo "ERROR: .release-pr.json has no .version_regex to validate VERSION against"
            exit 1
          fi
          if [[ ! "$VERSION" =~ ^${REGEX}$ ]]; then
            echo "ERROR: VERSION '$VERSION' does not match .release-pr.json version_regex '$REGEX'"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Tag merge commit (idempotent)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          MERGE_SHA: ${{ github.sha }}
        run: |
          TAG="v${VERSION}"
          EXISTING=$(git rev-parse --verify "refs/tags/${TAG}" 2>/dev/null || true)

          if [ -z "$EXISTING" ]; then
            # Case 1: tag does not exist — create it at the merge SHA.
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$TAG" "$MERGE_SHA"
            git push origin "$TAG"
            echo "Created $TAG at $MERGE_SHA"
          elif [ "$EXISTING" = "$MERGE_SHA" ]; then
            # Case 2: tag already exists at this SHA — idempotent no-op.
            echo "Tag $TAG already at $MERGE_SHA; skipping."
          else
            # Case 3: tag exists at a different SHA — two merges claimed the
            # same version. The release PR forgot to bump VERSION.
            echo "ERROR: $TAG exists at $EXISTING but merge is $MERGE_SHA."
            echo "Two release merges to main have claimed the same version."
            echo "Open a follow-up PR that bumps VERSION, then re-merge."
            exit 1
          fi
